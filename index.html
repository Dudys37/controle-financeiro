<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinançasPRO — Login</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>">
<!-- TEMA: aplica ANTES de qualquer render para evitar flash -->
<script>
  (function(){
    var t=localStorage.getItem('cf_theme')||'dark';
    document.documentElement.setAttribute('data-theme',t);
  })();
</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#8B5CF6;--accent2:#6D28D9;--accent-glow:rgba(139,92,246,.25);
  --pos:#10B981;--pos2:#059669;
  --neg:#EF4444;
  --r8:8px;--r12:12px;--r16:16px;--rfull:9999px;
}
[data-theme="dark"]{
  --bg:#09090B;--card:#111117;--card2:#18181F;--card3:#1E1E27;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#F4F4F5;--text2:#71717A;--text3:#3F3F46;
  --shadow:0 8px 40px rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#F8F8FA;--card:#FFFFFF;--card2:#F4F4F6;--card3:#EEEEEF;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#09090B;--text2:#71717A;--text3:#D4D4D8;
  --shadow:0 8px 32px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
.bg-orb{position:fixed;pointer-events:none;border-radius:50%;z-index:0;}
.bg-orb-1{top:-180px;right:-180px;width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,.07) 0%,transparent 70%);}
.bg-orb-2{bottom:-120px;left:-80px;width:380px;height:380px;background:radial-gradient(circle,rgba(59,130,246,.05) 0%,transparent 70%);}
nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;border-bottom:1px solid var(--border);}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-icon{width:34px;height:34px;border-radius:var(--r8);background:linear-gradient(135deg,var(--accent),#60A5FA);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;}
.nav-name{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.nav-name span{color:var(--accent);}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--card2);color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.theme-btn:hover{background:var(--card3);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;position:relative;z-index:1;}
.wrap{width:100%;max-width:420px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r16);padding:36px 32px;box-shadow:var(--shadow);}
.view{display:none;}.view.on{display:block;animation:fadeup .25s ease;}
@keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card-header{text-align:center;margin-bottom:28px;}
.card-logo{width:52px;height:52px;border-radius:var(--r12);background:linear-gradient(135deg,var(--accent),#60A5FA);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 14px;}
.card-logo.green{background:linear-gradient(135deg,var(--pos),var(--pos2));}
.card-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--text2);line-height:1.55;}
.field{margin-bottom:14px;}
.flabel{display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.finput{width:100%;padding:11px 14px;border-radius:var(--r8);border:1.5px solid var(--border2);background:var(--card2);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s,background .15s;}
.finput:focus{border-color:var(--accent);background:var(--card);}
.finput::placeholder{color:var(--text3);}
.btn-pri{width:100%;padding:13px;border-radius:var(--rfull);border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .18s,transform .18s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px var(--accent-glow);margin-top:4px;}
.btn-pri:hover{opacity:.9;transform:translateY(-1px);}
.btn-pri:disabled{opacity:.45;cursor:default;transform:none;}
.btn-pri.green{background:linear-gradient(135deg,var(--pos),var(--pos2));box-shadow:0 2px 12px rgba(16,185,129,.3);}
.btn-sec{width:100%;padding:12px;border-radius:var(--rfull);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;}
.btn-sec:hover{background:var(--card2);color:var(--text);}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.alert{border-radius:var(--r8);padding:10px 14px;font-size:12px;font-weight:500;margin-bottom:14px;display:none;line-height:1.5;}
.alert.show{display:block;}
.alert-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#EF4444;}
.alert-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#10B981;}
.toggle-link{text-align:center;margin-top:18px;font-size:13px;color:var(--text2);}
.toggle-link a{color:var(--accent);font-weight:600;cursor:pointer;}
.toggle-link a:hover{text-decoration:underline;}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}
.features{display:flex;justify-content:center;gap:18px;margin-top:24px;flex-wrap:wrap;}
.feat{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;}
@media(max-width:480px){.card{padding:28px 18px;}nav{padding:0 16px;}}
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<nav>
  <div class="nav-brand">
    <div class="nav-icon">₿</div>
    <span class="nav-name">Finanças<span>PRO</span></span>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
</nav>

<main>
  <div class="wrap">
    <div class="card">

      <!-- ── LOGIN ── -->
      <div class="view on" id="v-login">
        <div class="card-header">
          <div class="card-logo">₿</div>
          <div class="card-title">Bem-vindo de volta</div>
          <div class="card-sub">Acesse sua conta para gerenciar suas finanças</div>
        </div>
        <div class="alert alert-err" id="login-err"></div>
        <div class="field">
          <label class="flabel">E-mail</label>
          <input class="finput" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label class="flabel">Senha</label>
          <input class="finput" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-pri" id="btn-login">
          <span id="login-label">Entrar na conta</span>
        </button>
        <div class="divider"><span>ou</span></div>
        <button class="btn-sec" onclick="showView('v-register')">
          ✨ Criar nova conta grátis
        </button>
        <div class="toggle-link">
          Não tem conta? <a onclick="showView('v-register')">Cadastre-se agora</a>
        </div>
      </div>

      <!-- ── CADASTRO ── -->
      <div class="view" id="v-register">
        <div class="card-header">
          <div class="card-logo green">✨</div>
          <div class="card-title">Criar sua conta</div>
          <div class="card-sub">Comece agora. É grátis e leva menos de 1 minuto.</div>
        </div>
        <div class="alert alert-err" id="reg-err"></div>
        <div class="alert alert-ok" id="reg-ok"></div>
        <div class="field">
          <label class="flabel">Seu nome</label>
          <input class="finput" type="text" id="reg-name" placeholder="Ex: João Silva" autocomplete="name">
        </div>
        <div class="field">
          <label class="flabel">E-mail</label>
          <input class="finput" type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label class="flabel">Senha</label>
          <input class="finput" type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <div class="field">
          <label class="flabel">Confirmar senha</label>
          <input class="finput" type="password" id="reg-conf" placeholder="Repita a senha" autocomplete="new-password">
        </div>
        <button class="btn-pri green" id="btn-register">
          <span id="reg-label">Criar minha conta</span>
        </button>
        <div class="divider"><span>ou</span></div>
        <button class="btn-sec" onclick="showView('v-login')">
          ← Voltar para o login
        </button>
        <div class="toggle-link">
          Já tem conta? <a onclick="showView('v-login')">Fazer login</a>
        </div>
      </div>

    </div><!-- /card -->

    <div class="features">
      <div class="feat">🔒 Dados seguros</div>
      <div class="feat">📊 Dashboard completo</div>
      <div class="feat">🚀 Método ARCA</div>
      <div class="feat">💳 Cartões de crédito</div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
/* ══════════════════════════════════════════════════
   FinançasPRO — index.js
   SEM redirecionamento automático para evitar loop
══════════════════════════════════════════════════ */

firebase.initializeApp({
  apiKey:"AIzaSyBG_wVVcAdqbLTetgYllAmbiJ8rQ6lLRsE",
  authDomain:"controle-financeiro-900a7.firebaseapp.com",
  projectId:"controle-financeiro-900a7",
  storageBucket:"controle-financeiro-900a7.firebasestorage.app",
  messagingSenderId:"361900607129",
  appId:"1:361900607129:web:901ff0ee9e3053a144da08"
});
const auth = firebase.auth();
const db   = firebase.firestore();

// ── TEMA (sem flash) ─────────────────────────────
let isDark = (localStorage.getItem('cf_theme')||'dark')==='dark';
function applyTheme(){
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=isDark?'☀️':'🌙';
}
function toggleTheme(){
  isDark=!isDark;
  localStorage.setItem('cf_theme',isDark?'dark':'light');
  applyTheme();
}
applyTheme();

// ── VIEWS ────────────────────────────────────────
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  // Limpa alertas
  document.querySelectorAll('.alert').forEach(a=>a.classList.remove('show'));
}

// ── HELPERS ──────────────────────────────────────
function setBtn(id, labelId, loading, text){
  const btn=document.getElementById(id);
  const lbl=document.getElementById(labelId);
  if(!btn)return;
  btn.disabled=loading;
  if(lbl) lbl.innerHTML=loading?'<div class="spin"></div>':text;
}
function showErr(id,msg){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg;
  el.className='alert alert-err show';
}
function showOk(id,msg){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg;
  el.className='alert alert-ok show';
}
function hideAlert(id){
  const el=document.getElementById(id);
  if(el) el.classList.remove('show');
}

// Mensagens de erro Firebase em PT-BR
const FB_MSGS = {
  'auth/user-not-found':      'E-mail não cadastrado no sistema.',
  'auth/wrong-password':      'Senha incorreta. Tente novamente.',
  'auth/invalid-credential':  'E-mail ou senha inválidos.',
  'auth/invalid-email':       'E-mail inválido.',
  'auth/too-many-requests':   'Muitas tentativas. Aguarde alguns minutos.',
  'auth/email-already-in-use':'Este e-mail já está cadastrado. Faça login.',
  'auth/weak-password':       'Senha muito fraca. Use no mínimo 6 caracteres.',
  'auth/network-request-failed':'Sem conexão. Verifique sua internet.',
};
const fbMsg = code => FB_MSGS[code] || 'Erro inesperado. Tente novamente.';

// ── LOGIN ─────────────────────────────────────────
function doLogin(){
  hideAlert('login-err');
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if(!email || !pass){ showErr('login-err','Preencha e-mail e senha.'); return; }
  setBtn('btn-login','login-label',true);
  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      // Login OK → vai para o app
      window.location.replace('app.html');
    })
    .catch(e => {
      showErr('login-err', fbMsg(e.code));
      setBtn('btn-login','login-label',false,'Entrar na conta');
    });
}

document.getElementById('btn-login').onclick = doLogin;
document.getElementById('login-pass').addEventListener('keydown', e=>{
  if(e.key==='Enter') doLogin();
});
document.getElementById('login-email').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('login-pass').focus();
});

// ── CADASTRO ─────────────────────────────────────
function doRegister(){
  hideAlert('reg-err'); hideAlert('reg-ok');
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const conf  = document.getElementById('reg-conf').value;

  if(!name || !email || !pass || !conf){
    showErr('reg-err','Preencha todos os campos.'); return;
  }
  if(pass.length < 6){
    showErr('reg-err','A senha deve ter pelo menos 6 caracteres.'); return;
  }
  if(pass !== conf){
    showErr('reg-err','As senhas não coincidem.'); return;
  }

  setBtn('btn-register','reg-label',true);

  auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => {
      // Salva perfil no Firestore com role 'user'
      return db.collection('users').doc(cred.user.uid).set({
        email,
        displayName: name,
        role: 'user',
        uid: cred.user.uid,
        createdAt: new Date().toISOString()
      });
    })
    .then(() => {
      // Cadastro OK → vai para o app (dados financeiros começam zerados)
      window.location.replace('app.html');
    })
    .catch(e => {
      showErr('reg-err', fbMsg(e.code));
      setBtn('btn-register','reg-label',false,'Criar minha conta');
    });
}

document.getElementById('btn-register').onclick = doRegister;
document.getElementById('reg-conf').addEventListener('keydown', e=>{
  if(e.key==='Enter') doRegister();
});

// ── NOTA IMPORTANTE ──────────────────────────────
// NÃO há onAuthStateChanged aqui propositalmente.
// Redirecionamento automático causava loop infinito:
//   index.html → detecta usuário → app.html
//   app.html → algum erro → index.html → loop
//
// O usuário só vai para app.html ao clicar em Entrar
// ou após criar conta com sucesso.
</script>
</body>
</html>
